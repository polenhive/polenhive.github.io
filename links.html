
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Polenhive ✨</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(180deg, #ffd6e8, #fff0f6);
    color: #222;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.container {
    width: 90%;
    max-width: 420px;
    text-align: center;
    background: rgba(255,255,255,0.7);
    padding: 40px;
    border-radius: 30px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    backdrop-filter: blur(10px);
}

h1 {
    font-size: 2.4rem;
    margin-bottom: 10px;
}

p {
    color: #555;
    margin-bottom: 30px;
}

.link {
    display: block;
    text-decoration: none;
    margin: 15px 0;
    padding: 16px;
    border-radius: 20px;
    background: white;
    color: #111;
    font-weight: bold;
    transition: 0.2s ease;
    border: 2px solid #ffc2da;
}

.link:hover {
    transform: scale(1.03);
    background: #ffe4ef;
}

.footer {
    margin-top: 25px;
    font-size: 0.85rem;
    color: #777;
}
</style>
</head>
<body>
<div class="container">
    <h1>✨ Polenhive ✨</h1>
    <p>Art • Comics • Animation</p>

    <a class="link" href="https://www.instagram.com/polenhive/" target="_blank">Instagram</a>
    <a class="link" href="https://polenhive.github.io/" target="_blank">Portfolio Website</a>
    <a class="link" href="https://www.linkedin.com/in/polenhive" target="_blank">LinkedIn</a>

    <div class="footer">Made with sparkle energy ✨</div>
</div>
</body>
</html>
