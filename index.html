<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- 
    ================================================
    CHICA CÓMIC - Página principal
    Edita el título y descripción aquí abajo
    ================================================
  -->
  <title>Chica Cómic ✨</title>
  <meta name="description" content="Tu plataforma de cómics favorita 💖">

  <!-- Estilos - el orden importa -->
  <link rel="stylesheet" href="variables.css">   <!-- Colores y fuentes -->
  <link rel="stylesheet" href="components.css">  <!-- Componentes -->
</head>
<body>

  <!-- ===== NAVBAR ===== -->
  <nav class="navbar">
    <div class="navbar-logo" onclick="navegarA('home')" style="cursor:pointer">
      ✨ CHICA CÓMIC ✨
    </div>
    <ul class="navbar-nav">
      <li><a href="#" data-pagina="home"       onclick="event.preventDefault(); navegarA('home')">       🗂️ Comics</a></li>
      <li><a href="#" data-pagina="characters" onclick="event.preventDefault(); navegarA('characters')"> 👥 Personajes</a></li>
      <li><a href="#" data-pagina="library"    onclick="event.preventDefault(); navegarA('library')">    📚 Librería</a></li>
    </ul>
  </nav>

  <!-- ===== CONTENIDO PRINCIPAL ===== -->
  <main id="app" style="padding-bottom: 4rem; min-height: calc(100vh - 80px)">
    <!-- El contenido se inyecta aquí por JavaScript -->
  </main>

  <!-- ===== STICKERS FLOTANTES ===== -->
  <div id="stickers" aria-hidden="true"></div>

  <!-- ===== BOTÓN MÚSICA ===== -->
  <button class="btn-musica" onclick="toggleMusica()">
    <span id="btn-musica-texto">🎵 Music OFF</span>
  </button>

  <!-- ===== TICKER INFERIOR ===== -->
  <div class="ticker-wrap" aria-hidden="true">
    <div class="ticker-inner" id="ticker-inner"></div>
  </div>

  <!-- Scripts - data primero, luego la app -->
  <script src="data.js"></script>   <!-- 📝 Edita tu contenido aquí -->
  <script src="app.js"></script>    <!-- ⚙️ Lógica de la app -->

</body>
</html>
